# Heroku container deploy: `git push heroku main` builds the Dockerfile and
# releases the image as the `web` process. This file only takes effect on the
# `container` stack (heroku stack:set container) — on the default buildpack
# stack Heroku ignores it and tries to detect a Java app instead, building the
# jar WITHOUT the frontend stage, so you deploy an API with no UI. (It also
# compiles with its own JDK, which is how Lombok silently stopped running and
# produced a hundred "cannot find symbol: getId()" errors on correct code.)
#
# `web` is not an arbitrary name: it is the one process type Heroku routes
# HTTP (and WebSocket) traffic to.
build:
  docker:
    web: Dockerfile

# THE RUN COMMAND IS DECLARED HERE, not left to the image's CMD, and that is
# load-bearing rather than tidy.
#
# Left to itself, Heroku's container runtime takes the image's own start command
# and re-wraps it in a shell, escaping every character as it goes — so a command
# that needs `$PORT` expanded arrives with the dollar sign, the braces and even
# the spaces backslash-escaped, and executes as one meaningless token. The dyno
# then exits with status 0, prints nothing, and crash-loops. Naming the command
# here skips that mangling entirely: Heroku runs THIS string, in a real shell,
# with $PORT already in the environment.
#
# $PORT with no fallback is deliberate. On Heroku it is always set, and if it
# somehow were not, binding to an empty port and failing loudly beats binding to
# 8080 and getting quietly killed by a router that is knocking somewhere else.
# (The Dockerfile's CMD keeps its ${PORT:-8080} default for local `docker run`,
# where PORT genuinely is unset. This line replaces that CMD, it does not fight
# with it — which is exactly why the Dockerfile uses CMD and not ENTRYPOINT.)
#
# THE HEAP FLAGS ARE NOT OPTIONAL, and their absence does not look like a memory
# problem. A Basic dyno has 512MB. Nothing here constrains the JVM, and the JVM
# sizes its heap from the memory it BELIEVES it has — which on a dyno is far more
# than 512MB — so it happily grows past the quota. Heroku then reports
#
#     Error R14 (Memory quota exceeded)
#
# and starts swapping rather than killing the process, so the app stays "up" and
# merely becomes unable to finish requests: an audio upload died mid-connection
# with no HTTP status and no stack trace at all. R14 is a WARNING in the log, not
# a crash, which is exactly why it is easy to stare past.
#
# (The Java buildpack sets these for you. Moving to the container stack means
# inheriting that job — a hidden cost of the switch, paid exactly once, here.)
#
# 300m heap + 128m metaspace + 64m code cache + threads lands comfortably under
# 512MB. SerialGC because G1's per-region bookkeeping is poor value on a heap
# this small, and it is one fewer thing competing for a single dyno's CPU.
run:
  web: java -Xmx300m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=64m -Xss512k -XX:+UseSerialGC -Dserver.port=$PORT -jar /app/app.jar
