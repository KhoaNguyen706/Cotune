# CI/CD: every push and PR runs the tests; pushes to main additionally
# build the production Docker image (frontend + backend in one) and publish
# it to GitHub Container Registry, then poke the host's deploy hook if one
# is configured. "CI proves the code, CD ships the artifact CI proved."
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          # Caches ~/.m2 keyed on pom.xml — the dependency download happens
          # once per pom change, not once per push.
          cache: maven
      # -B (batch) silences the interactive progress spam that makes CI
      # logs unreadable. Since Session 12 this runs BOTH layers: the mocked
      # unit tests AND the Testcontainers integration tests — ubuntu
      # runners ship a Docker daemon, so the throwaway Postgres just works
      # here, no service-container config needed. The suite in CI is
      # byte-identical to `./mvnw test` locally; if it's green here it's
      # green there, which is the whole point.
      - run: ./mvnw -B test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm ci (not install): installs EXACTLY package-lock.json or fails —
      # reproducible builds, no "works on my machine" drift.
      - run: npm ci
      # tsc --noEmit + vite build: the frontend's whole compile gate.
      - run: npm run build
      # The AI plan-reading rules (plan.ts). Unit tests exist for exactly one
      # module, because it is the one place a wrong answer is both silent and
      # destructive: composeInto applies a plan in an order that depends on
      # these, and getting it wrong throws away unsaved work. The code that
      # CALLS them needs a live Gemini key and a browser, so the decisions
      # were moved somewhere a keyless test can reach them.
      - run: npm test

  # One real browser through the one path everything depends on: register →
  # song → socket → note, zero console errors. Exists because the hooks
  # refactor shipped a reload loop that tsc AND the build both passed —
  # only a browser executing the real render loop catches that class of
  # bug. The stack here is dev-shaped (vite + spring-boot jar + postgres),
  # not the Docker image: the point is exercising OUR code in a browser,
  # and the image's own assembly is already proven by publish-image.
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Same image as Testcontainers and compose — one Postgres story.
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cotune
          POSTGRES_USER: cotune
          POSTGRES_PASSWORD: cotune
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cotune"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend
      # Installs the browser binary + its system libraries. Cached by
      # playwright itself under ~/.cache/ms-playwright across runs of the
      # same runner image version.
      - run: npx playwright install --with-deps chromium
        working-directory: frontend

      # The real jar (skipTests: backend-tests already owns proving the
      # code; this job only needs a server to stand up). Dev defaults match
      # the service container above, so no configuration at all.
      - run: ./mvnw -B -DskipTests package
      - name: Start backend and vite
        run: |
          java -jar target/*.jar > backend.log 2>&1 &
          (cd frontend && npm run dev > vite.log 2>&1 &)
          # The health endpoint added in Phase 1 doing its first real job:
          # "up" here means Flyway ran and the app can query Postgres.
          curl --retry 30 --retry-delay 2 --retry-all-errors -fsS \
            http://localhost:8080/actuator/health
          curl --retry 15 --retry-delay 2 --retry-all-errors -fsS \
            http://localhost:5173 > /dev/null

      - run: npm run smoke
        working-directory: frontend

      # The logs are the only way to debug a CI-only failure; ship them
      # exactly when they're needed.
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            backend.log
            frontend/vite.log

  # Only after all three gates pass, and only on main (a PR must never
  # publish).
  publish-image:
    needs: [backend-tests, frontend-build, smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # allows pushing to ghcr.io under this repo's owner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is minted per-run by Actions — no long-lived
          # registry password stored anywhere.
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest for humans, :<sha> for rollbacks — every main commit
          # stays deployable forever by its exact hash.
          tags: |
            ghcr.io/khoanguyen706/cotune:latest
            ghcr.io/khoanguyen706/cotune:${{ github.sha }}

      # Optional continuous DEPLOYMENT: hosts like Render expose a "deploy
      # hook" URL — an authenticated poke meaning "pull and restart". Add it
      # as the repo secret DEPLOY_HOOK_URL and every green main goes live;
      # leave the secret unset and this step is a silent no-op.
      - name: Trigger deploy hook (if configured)
        env:
          HOOK: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" && echo "deploy triggered"
          else
            echo "DEPLOY_HOOK_URL not set - skipping deploy trigger"
          fi
