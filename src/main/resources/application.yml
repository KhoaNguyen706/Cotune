spring:
  application:
    name: cotune

  datasource:
    url: jdbc:postgresql://localhost:5432/cotune
    username: cotune
    password: cotune # dev-only; real environments inject this via env vars

  jpa:
    hibernate:
      # validate = Hibernate checks entity mappings against the real schema
      # at startup and refuses to boot on mismatch. Flyway owns the schema;
      # letting Hibernate mutate it (ddl-auto=update) makes environments
      # drift apart in ways nobody reviewed.
      ddl-auto: validate
    # OSIV keeps a DB session open for the whole HTTP request so views can
    # lazy-load. Sounds convenient, but it holds connections hostage under
    # load and hides missing-fetch bugs until production. Off from day one.
    open-in-view: false

  graphql:
    graphiql:
      # In-browser IDE at /graphiql for exploring the API. Dev convenience;
      # disable (or gate behind auth) before anything public-facing.
      enabled: true

cotune:
  security:
    jwt:
      # HMAC-SHA256 signing key, Base64-encoded, >= 256 bits. The ${VAR:default}
      # syntax means: use the JWT_SECRET env var if set, else this dev-only
      # fallback. The fallback is fine locally but MUST be overridden in any
      # shared environment — anyone who knows the signing key can mint a
      # token for any user with any role.
      secret: ${JWT_SECRET:o4v2MifYO/cSXQkB9fWtvtrZu5+VKHg8xC/B872+sf4=}
      # Short on purpose: JWTs can't be revoked, so TTL bounds the damage
      # window of a leaked token AND how long a stale role claim survives.
      ttl: 1h

logging:
  level:
    # Log the SQL Hibernate actually emits — while learning, always check
    # what your ORM does under the hood (N+1s hide here).
    org.hibernate.SQL: debug
