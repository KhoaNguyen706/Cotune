spring:
  application:
    name: cotune

  datasource:
    url: jdbc:postgresql://localhost:5432/cotune
    username: cotune
    password: cotune # dev-only; real environments inject this via env vars

  data:
    redis:
      # Only actually connected to when cotune.realtime.relay=redis. Lettuce
      # opens connections lazily, so these being wrong (or Redis being absent)
      # costs nothing while the relay is off — which is why the default dev
      # setup needs no Redis container at all.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      #
      # NOTE THERE IS NO `url:` KEY HERE, and that is deliberate — I tried.
      #
      # Every managed Redis (Heroku, Render, Upstash, ElastiCache with auth)
      # gives you ONE URL carrying a password and usually TLS —
      # rediss://:pw@host:6379 — not a host/port pair, and host+port alone
      # cannot authenticate. So production needs `spring.data.redis.url`.
      #
      # The tempting way to write that is `url: ${REDIS_URL:}` — empty default,
      # harmless in dev. It is NOT harmless: Boot does not treat an empty url as
      # absent, it tries to PARSE it, and the whole app dies at startup with
      # `RedisUrlSyntaxException: Invalid Redis URL ''` — in dev, in tests,
      # everywhere. An unset property and a property set to "" are different
      # things, and only the first one falls back to host/port above.
      #
      # So the url is supplied ONLY as an environment variable, never from YAML:
      # Boot's relaxed binding maps SPRING_DATA_REDIS_URL → spring.data.redis.url
      # with no config entry needed. Unset it and this key simply does not exist,
      # which is exactly the behaviour we want. See the README's Heroku section.

  jpa:
    hibernate:
      # validate = Hibernate checks entity mappings against the real schema
      # at startup and refuses to boot on mismatch. Flyway owns the schema;
      # letting Hibernate mutate it (ddl-auto=update) makes environments
      # drift apart in ways nobody reviewed.
      ddl-auto: validate
    # OSIV keeps a DB session open for the whole HTTP request so views can
    # lazy-load. Sounds convenient, but it holds connections hostage under
    # load and hides missing-fetch bugs until production. Off from day one.
    open-in-view: false

  servlet:
    multipart:
      # Matches AudioFile.MAX_SIZE_BYTES (the domain check is the real
      # guarantee; this just rejects oversize uploads before buffering).
      max-file-size: 15MB
      max-request-size: 16MB

  graphql:
    graphiql:
      # In-browser IDE at /graphiql for exploring the API. Dev convenience;
      # disable (or gate behind auth) before anything public-facing.
      enabled: true

cotune:
  realtime:
    # local | redis — how a broadcast reaches collaborators.
    #
    #   local  (default): hand it to this JVM's in-memory STOMP broker. Correct
    #                     and free for a single instance, which is what you run
    #                     in dev — nobody should need a Redis to work on the
    #                     beat grid.
    #   redis           : PUBLISH it, and let every instance deliver its own
    #                     copy to its own clients. Required the moment more than
    #                     one instance serves the same song, and harmless (just
    #                     slower by a round trip) if you enable it on one.
    #
    # The DEFAULT IS THE SAFE-IN-DEV one, not the safe-in-prod one, which is a
    # deliberate inversion of the usual rule: getting this wrong in dev costs a
    # confusing afternoon, and getting it wrong in prod is a support ticket that
    # says "my collaborator's edits only show up sometimes" — the "sometimes"
    # being whether the load balancer put you on the same instance. Deployments
    # that run more than one instance MUST set REALTIME_RELAY=redis.
    relay: ${REALTIME_RELAY:local}
    # One channel for the whole system. Every instance sees every song's traffic
    # and drops what it has no local subscribers for — see RelaySubscriber for
    # why that is the right trade today and where it stops being one.
    channel: cotune:realtime

  storage:
    # local | supabase — where uploaded audio bytes live (V9 moved them out of
    # Postgres).
    #
    #   local (default): the filesystem. Durable on your laptop, and durable in
    #                    docker-compose because BOTH app containers mount the
    #                    same named volume. Needs no credentials, which is why
    #                    it is the default — see LocalAudioStorage.
    #   supabase       : Supabase Storage (S3-backed object storage).
    #
    # PLATFORM DEPLOYMENTS MUST USE supabase. A container filesystem on Heroku
    # is ephemeral AND the dyno is recycled at least daily, so `local` there
    # does not mean "audio is at risk when you scale" — it means every sample
    # anyone uploads is gone by tomorrow morning, on a single dyno. Same class
    # of bug as the pre-session-19 broker: fine on one box, quietly wrong on a
    # real one. See AudioStorage.
    backend: ${STORAGE_BACKEND:local}
    # Only read by the `local` backend.
    audio-dir: ${AUDIO_STORAGE_DIR:./data/audio}
    supabase:
      # Only read by the `supabase` backend, hence the empty defaults: they let
      # dev and compose boot with no Supabase account at all. The prod profile
      # drops the defaults so a deploy that forgets them fails loudly at boot
      # rather than at the first upload.
      url: ${SUPABASE_URL:}
      # service_role, NOT anon — see SupabaseAudioStorage. Root credential.
      service-key: ${SUPABASE_SERVICE_KEY:}
      bucket: ${SUPABASE_BUCKET:cotune-audio}
  ai:
    # The @ai chat advisor (server-side Claude call — see AiAdvisor). An EMPTY
    # key means DISABLED, and that is the correct dev default: the app must
    # boot, test and demo with no Anthropic account, and an @ai mention then
    # gets a polite "not configured" chat reply instead of an error. Set the
    # ANTHROPIC_API_KEY config var in prod to switch it on — no code change,
    # no profile change.
    api-key: ${ANTHROPIC_API_KEY:}
    # Anthropic's CHEAPEST current model (chosen deliberately, July 14):
    # musical advice over a 16-step text grid is squarely inside Haiku's
    # range, and at $1/$5 per MTok a question costs well under a tenth of a
    # cent. Overridable per deploy — set ANTHROPIC_MODEL=claude-opus-4-8 to
    # trade pennies for the strongest answers; AiAdvisor's request shape is
    # valid on every current model, so the swap is config-only.
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5}

  security:
    # Accounts that are ALWAYS admins — applied at startup (AdminBootstrap)
    # and at registration, so the grant survives database resets and fresh
    # environments instead of living only in one database's rows. Comma-
    # separated. The default is the app owner's account (their request,
    # July 14); override per deploy with ADMIN_EMAILS.
    admin-emails: ${ADMIN_EMAILS:khoa.nguyen02@sjsu.edu}
    jwt:
      # HMAC-SHA256 signing key, Base64-encoded, >= 256 bits. The ${VAR:default}
      # syntax means: use the JWT_SECRET env var if set, else this dev-only
      # fallback. The fallback is fine locally but MUST be overridden in any
      # shared environment — anyone who knows the signing key can mint a
      # token for any user with any role.
      secret: ${JWT_SECRET:o4v2MifYO/cSXQkB9fWtvtrZu5+VKHg8xC/B872+sf4=}
      # 12h IS A DECISION, NOT DRIFT (was 1h). The trade: JWTs can't be
      # revoked, so TTL is both the damage window of a leaked token and how
      # long a stale role claim survives — and it is ALSO the session length,
      # because there is no refresh mechanism. At 1h a musician mid-session
      # was silently logged out and their next save failed; a music session
      # is an afternoon, not an hour. 12h covers the longest plausible one
      # while still expiring every token daily. Revocation story if a token
      # leaks: rotate JWT_SECRET — logs everyone out, kills every token at
      # once. Revisit (proper refresh tokens) if accounts ever hold anything
      # more sensitive than songs.
      ttl: 12h
    rate-limit:
      # Per-IP token buckets (see RateLimitFilter). auth-per-minute guards the
      # two open BCrypt endpoints (login/register) — sized for a human who
      # mistypes a password, hostile to a curl loop. general-per-minute is a
      # runaway-client backstop, not a WAF. Same values in dev and prod: a
      # limit you never ran with locally is a limit you'll first meet in an
      # incident. (Integration tests raise these — one JVM replaying the whole
      # suite from 127.0.0.1 is exactly the traffic shape the limiter exists
      # to stop.)
      enabled: true
      auth-per-minute: 10
      general-per-minute: 300

management:
  endpoints:
    web:
      exposure:
        # health and NOTHING else. Actuator ships dozens of endpoints
        # (/env dumps config including secrets' shapes, /heapdump hands out
        # the whole JVM). This is Boot's default, restated so nobody
        # "temporarily" widens it without reading this. SecurityConfig
        # additionally denies everything under /actuator except health —
        # two independent layers have to be wrong before /env is public.
        include: health
  endpoint:
    health:
      # Component breakdown (db up? disk?) visible in dev, where it is a
      # debugging aid. The prod profile sets `never`: an unauthenticated
      # endpoint must not narrate the infrastructure to the internet.
      show-details: always
  health:
    redis:
      # OFF because Redis is on the classpath but deliberately not CONNECTED
      # while the relay is `local` (one instance — see cotune.realtime.relay).
      # Boot auto-registers a Redis health check the moment the starter is
      # present, so without this line health reports DOWN for the crime of
      # not using a Redis we don't need. Flip to true in the same change that
      # sets REALTIME_RELAY=redis — from that day on, "Redis unreachable"
      # really does mean "collaboration is broken".
      enabled: false

logging:
  level:
    # Log the SQL Hibernate actually emits — while learning, always check
    # what your ORM does under the hood (N+1s hide here).
    org.hibernate.SQL: debug
