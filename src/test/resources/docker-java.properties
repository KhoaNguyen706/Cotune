# Read by docker-java (the client under Testcontainers) from the test
# classpath. Without this it speaks legacy Docker API v1.24, which Docker
# Engine 29+ dropped — every /info probe gets 400 and Testcontainers
# reports "Could not find a valid Docker environment" even though Docker
# is running fine. Diagnosed by hand-probing the named pipe: /info and
# /v1.44/info answer 200, /v1.24/info answers the exact 400 the strategy
# logs. 1.44 (Docker 25, early 2024) is the deliberate pick: new enough
# for engines that dropped the legacy floor, old enough for any CI
# runner. Remove once the Boot BOM ships a Testcontainers whose
# docker-java defaults to a modern API version.
api.version=1.44
